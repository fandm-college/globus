title: F&M Globus User Guide
description: Research Computing Services documentation for Globus at Franklin & Marshall College
theme: just-the-docs

url: ""
baseurl: ""

permalink: pretty

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/

heading_anchors: true
nav_sort: case_insensitive
back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  "Globus Web App":
    - "https://app.globus.org"
  "Service Portal":
    - "https://request.fandm.edu"
  "Official Globus Docs":
    - "https://docs.globus.org/"
  "Research Computing Services":
    - "https://fandm-college.github.io/rcs-website/"

footer_content: "Research Computing Services Documentation Series • F&M Globus User Guide"

color_scheme: fandm

callouts:
  good-to-know:
    title: Good to Know
    color: blue
  expect:
    title: What Should I Expect?
    color: green
  help:
    title: Need Help?
    color: yellow
  optional:
    title: Optional Advanced Topic
    color: purple
  recommendation:
    title: Research Computing Services Recommendation
    color: red
  security:
    title: Security and Data Use
    color: red
  important:
    title: Important
    color: red

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

plugins:
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
